# Nginx configuration for LOR-CGR Application
# Place this file at: /etc/nginx/sites-available/lorcgr
# Then: sudo ln -s /etc/nginx/sites-available/lorcgr /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name lorcgr.xlab.online 45.71.242.131;
    
    # Redirect HTTP to HTTPS (uncomment after SSL is configured)
    # return 301 https://$host$request_uri;
    
    # Next.js Frontend
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
    
    # Next.js static files
    location /_next/static {
        alias /opt/lorcgr-frontend/.next/static;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    
    # Public files (images, etc.)
    location /public {
        alias /opt/lorcgr-frontend/public;
        expires 7d;
    }
    
    # Django Backend API
    location /api {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Django Admin and static files
    location /admin {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    location /static {
        proxy_pass http://127.0.0.1:8000;
        expires 7d;
    }
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;
}

